    function renderCards() {
        if (!cardsArea) return;
        cardsArea.innerHTML = '';
        CARD_LIST.forEach(item => {
            const article = ARTICLES[item.id];
            const shortDesc = (article && article.meta) ? article.meta : item.desc;
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-id', item.id);
            card.innerHTML = `<h3>${item.title}</h3><p>${shortDesc}</p><div class="badge">📖 Read more →</div>`;
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                showDetail(item.id);
            });
            cardsArea.appendChild(card);
        });
    }

    function showDetail(articleId) {
        const article = ARTICLES[articleId];
        if (!article) return;
        const detailHtml = `<div><div class="detail-title">${article.title}</div><div class="detail-meta">📌 ${article.meta}</div><div class="detail-text">${article.content}</div></div>`;
        detailContentDiv.innerHTML = detailHtml;
        homeContainer.classList.add('hidden');
        detailContainer.classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        if (history.pushState) {
            history.pushState({ view: 'detail', id: articleId }, '', `#${articleId}`);
        }
    }

    function backToHome() {
        detailContainer.classList.add('hidden');
        homeContainer.classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        if (location.hash) history.replaceState(null, '', ' ');
    }

    function handlePopState() {
        if (!detailContainer.classList.contains('hidden')) backToHome();
        else if (location.hash && location.hash.length > 1) {
            const id = location.hash.slice(1);
            if (ARTICLES[id]) showDetail(id);
        }
    }

    function init() {
        renderCards();
        backBtn.addEventListener('click', backToHome);
        window.addEventListener('popstate', handlePopState);
        if (location.hash && location.hash.length > 1) {
            const id = location.hash.substring(1);
            if (ARTICLES[id]) showDetail(id);
        }
    }
    init();
