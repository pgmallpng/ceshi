        function onWheel(e) { if (!lightboxActive) return; e.preventDefault(); const delta = e.deltaY > 0 ? -0.1 : 0.1; let newZoom = currentZoom + delta; newZoom = Math.min(Math.max(newZoom, 0.5), 3); if (newZoom !== currentZoom) { currentZoom = newZoom; applyTransform(); clampTranslate(); } }

        // ---------- Data ----------
        const CARDS_DATA = [
            { id: "what-is-pg", title: "🌐 What Is PG?", meta: "Legal tech service since 2018 · 8 years stable", desc: "Online work platform since 2018",
              content: `<p>PG (PG Playground) is a legally registered technology service company in Colorado, USA. PG has been stably operating for <strong>8 years</strong> since its founding in 2018.</p><p>We specialize in providing online marketing data support for global brands by generating real order records to enhance their market visibility.</p><p>Users earn commissions by completing assigned order tasks. Tasks are divided by levels — higher levels come with more daily tasks and higher daily pay. All tasks are generated based on real brand demands, ensuring data authenticity and business compliance.</p><p>Income is settled based on actual task completion. Withdrawals are supported every workday (minimum amount varies by level, no upper limit).</p><p>All deposits serve as order working capital and are fully refundable upon exit.</p><p>The platform uses an automated order review and settlement system to ensure transaction transparency and fund security.</p><p>PG is committed to transparent rules, refundable funds, and real earnings. We do not promise "get rich quick" — but we strive to provide every diligent user with a long‑term, stable, and sustainable online work opportunity.</p><p>For any questions, please contact your manager or the official support team.</p>` },
            { id: "why-pg-safe", title: "🔒 Why Is PG Safe?", meta: "Legal registration, fund security, transparent rules", desc: "Legal, stable, fund security & verifiable",
              content: `<ul><li><strong>Legally Registered</strong> — Colorado, USA (2018), address publicly accessible</li><li><strong>Stable Operation</strong> — Stably operated for 8 years</li><li><strong>Fund Security</strong> — Deposit is working capital, earnings are labor‑based</li><li><strong>Transparent Rules</strong> — Every record traceable, income matched to orders</li><li><strong>Verifiable</strong> — Company info can be verified via official channels</li></ul><p>⭐ Thousands trust PG for daily online income – fully compliant.</p><div style="display: flex; flex-direction: column; align-items: center; margin-top: 20px;"><img src="images/pg-registration.jpg" alt="PG Registration Certificate" style="max-width: 100%; border-radius: 12px; cursor: pointer;" onclick="openLightbox(this)"><div style="margin-top: 8px; font-size: 0.8rem; color: var(--text-muted);">PG Registration Certificate</div><div style="margin-top: 12px;"><a href="https://www.coloradosos.gov/biz/BusinessEntityDetail.do?quitButtonDestination=BusinessEntityCriteriaExt&fileId=20181650293&masterFileId=" target="_blank" rel="noopener noreferrer" style="display: inline-block; background: var(--contact-bg); padding: 6px 14px; border-radius: 40px; text-decoration: none; color: var(--badge-color); font-weight: 500; font-size: 0.85rem;">🔍 Verify on Colorado SOS ↗</a></div></div>` },
            { id: "deposit-earnings", title: "💰 Earn per Level", meta: "Level 1–3 · daily tasks · weekly income & withdrawal limits", desc: "Weekly earnings: K21 (L1) · K138.6 (L2) · K364 (L3)",
              content: `<div class="salary-grid"><div class="salary-card-item"><div class="level-header"><span class="level-name">🌟 Level 1</span><span class="level-badge">💰 Recharge: K240</span></div><div class="salary-details"><div class="detail-field"><div class="field-label">📋 Tasks per day</div><div class="field-value">3</div></div><div class="detail-field"><div class="field-label">🏆 Weekly income</div><div class="field-value">K21</div></div><div class="detail-field"><div class="field-label">💸 Min withdrawal</div><div class="field-value">K14</div></div><div class="detail-field"><div class="field-label">💸 Max withdrawal</div><div class="field-value">No limit</div></div></div></div><div class="salary-card-item"><div class="level-header"><span class="level-name">⭐ Level 2</span><span class="level-badge">💰 Recharge: K670</span></div><div class="salary-details"><div class="detail-field"><div class="field-label">📋 Tasks per day</div><div class="field-value">6</div></div><div class="detail-field"><div class="field-label">🏆 Weekly income</div><div class="field-value">K138.6</div></div><div class="detail-field"><div class="field-label">💸 Min withdrawal</div><div class="field-value">K80</div></div><div class="detail-field"><div class="field-label">💸 Max withdrawal</div><div class="field-value">No limit</div></div></div></div><div class="salary-card-item"><div class="level-header"><span class="level-name">🚀 Level 3</span><span class="level-badge">💰 Recharge: K1,700</span></div><div class="salary-details"><div class="detail-field"><div class="field-label">📋 Tasks per day</div><div class="field-value">8</div></div><div class="detail-field"><div class="field-label">🏆 Weekly income</div><div class="field-value">K364</div></div><div class="detail-field"><div class="field-label">💸 Min withdrawal</div><div class="field-value">K250</div></div><div class="detail-field"><div class="field-label">💸 Max withdrawal</div><div class="field-value">No limit</div></div></div></div></div><p><em>Interns are eligible for a discount. Contact your manager for the exact amount.</em></p><p>💡 Your deposit is working capital (fully refundable). Higher level = more daily orders + higher earnings.</p>` },
            { id: "topup-steps", title: "🔁 Top‑Up Steps", meta: "4 easy steps to fund your account", desc: "Contact manager → transfer → confirm → credit",
              content: `<ol><li>Contact your manager to get the current account details.</li><li>Transfer the required deposit (keep a screenshot of the Ref No).</li><li>Send the screenshot to your manager. Once confirmed, the funds will be credited to your PG account.</li><li>The platform supports transfers via <strong>BSP, Kina, USDT, and other local banks</strong>.</li></ol><p>⚠️ Always confirm details with your manager before any transfer.</p>` },
            { id: "withdrawal-rules", title: "🏦 Withdrawal", meta: "Request schedule & arrival time", desc: "Mon–Fri only, arrive 1–4 days",
              content: `<ul><li><strong>Withdrawal request:</strong> Monday–Friday (no requests on weekends).</li><li><strong>Funds arrive:</strong> 1–4 days (including weekends).</li><li><strong>Minimum withdrawal:</strong> depends on your level.</li></ul><p>📌 All withdrawals are processed in order. Make sure your bank account details are correct to avoid delays.</p>` },
            { id: "why-topup", title: "❓ Why Top Up?", meta: "Deposit = working capital (refundable)", desc: "Deposit is working capital, fully refundable",
              content: `<p>The deposit is <strong>not a "fee"</strong> – it's working capital to support your order flow.</p><p>Each order requires matching funds to complete the process. Your deposit stays in your account as a tool for your daily tasks. Every order you complete earns you commission. When you upgrade or leave, the deposit is fully refunded.</p><p>✅ Your earnings are purely from completed tasks.</p>` },
            { id: "task-steps", title: "📝 Task Steps", meta: "Step-by-step guide for interns & level 1-3", desc: "Step-by-step: add address → submit order",
              content: `<p><strong>📍 1. Add your shipping address (one time only)</strong><br>Go to <strong>User Center</strong> (bottom right) → scroll down to find "Shipping Address" → enter your address once.</p><p><strong>🏠 2. Enter the task page</strong><br>On Home screen, tap <strong>"intern"</strong> (if you are an intern) or your level button (<strong>Level 1/2/3</strong>). Then select the first item and click <strong>"Buy Now"</strong>.</p><p><strong>🛒 3. Review order & submit</strong><br>After selecting <strong>"Select All"</strong>, click <strong>"Checkout"</strong> → then click <strong>"Submit Order and Confirm"</strong>.</p><div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center; margin:20px 0;"><div style="text-align:center; width:160px;"><img src="images/address.jpg" alt="Shipping address" style="width:100%; border-radius:12px; cursor:pointer;" onclick="openLightbox(this)" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27100%27%20height%3D%27100%27%3E%3Crect%20fill%3D%27%23ccc%27%20width%3D%27100%27%20height%3D%27100%27%2F%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2750%25%27%20dominant-baseline%3D%27middle%27%20text-anchor%3D%27middle%27%20fill%3D%27%23666%27%3ENo%20image%3C%2Ftext%3E%3C%2Fsvg%3E'"><div style="font-size:0.7rem; color:#5c7e97;">📍 Shipping address</div></div><div style="width:100%;"><div style="overflow-x:auto; -webkit-overflow-scrolling:touch; text-align:center;"><img src="images/checkout.png" alt="Full order process" style="max-width:none; height:auto; width:auto; min-width:200px; max-height:300px; border-radius:12px; cursor:pointer;" onclick="openLightbox(this)" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27200%27%20height%3D%27100%27%3E%3Crect%20fill%3D%27%23ccc%27%20width%3D%27200%27%20height%3D%27100%27%2F%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2750%25%27%20dominant-baseline%3D%27middle%27%20text-anchor%3D%27middle%27%20fill%3D%27%23666%27%3ENo%20image%3C%2Ftext%3E%3C%2Fsvg%3E'"></div><div style="font-size:0.7rem; color:#5c7e97; text-align:center;">📋 Swipe right to see full task flow →</div></div></div><p>✅ Once submitted, the system starts a countdown. When the countdown ends, the commission will be automatically credited to your balance.</p><p><em>This order is intended to help brands improve their product sales data. No physical product will be shipped to you.</em></p>` },
            // ---------- Final Order Guide with corrected status colors ----------
            { id: "order-problems", title: "📋 Order Guide", meta: "Auto completion & commission crediting · Order status explained", desc: "Countdown, commission, colors & limits",
              content: `<p>After you submit an order, the system starts a <strong>countdown (Review time)</strong>. When the countdown ends, the order is automatically completed, and the commission is automatically credited to your User Center balance.</p>
<p>Then you can submit a new order to continue working. Your daily order limit (Level 1: 3, Level 2: 6, Level 3: 8) frees up a slot once the countdown ends.</p>
<hr style="margin: 16px 0; border-color: var(--divider);">
<p><strong>📋 Understanding Your Orders</strong><br>
Each order card in "My Orders" shows: Order number, date, items, total amount, <strong>commission</strong>, payment status, shipping status, and countdown progress (<strong>Time Left</strong> & <strong>Shipped</strong>).</p>

<!-- Compact commission table -->
<div style="overflow-x: auto; margin: 16px 0;">

<p><strong>⏱️ How longer countdowns work</strong><br>
- Base countdown for any order is <strong>1 day</strong> (only whole days).<br>
- Total commission for a single order = daily base × countdown days.<br>
<em>Example: Level 1 order with 15-day countdown → K1 × 15 = K15 commission.</em></p>

<p><strong>🎨 Order Status Colors</strong><br>
<span style="color:#f87171;">🔴 Red order title</span> – Appears only in the <strong>"Pending processing"</strong> list. In a batch, this individual order has finished its countdown (the whole batch may still have other orders in progress).<br>
<span style="color:#4ade80;">🟢 Green order title</span> – Order still processing, countdown not finished.<br>
After <strong>all</strong> orders in a batch are completed, the entire batch moves to the <strong>"Completed"</strong> list (no red labels there).</p>

<p><strong>📦 Combined Orders (batch)</strong><br>
When you submit 2–3 orders together, they appear in the same batch. Different countdowns mean some may finish earlier (turn red) while others remain green.</p>

<p><strong>📌 Maximum orders working together</strong><br>
- Level 1: <strong>3</strong> orders &nbsp;|&nbsp; Level 2: <strong>6</strong> orders &nbsp;|&nbsp; Level 3: <strong>8</strong> orders<br>
(You can do this many orders at the same time. When one finishes, you can add a new one.)</p>

<p><strong>Important:</strong> Wait patiently during the countdown. Once credited, check your balance in "User Center". Then you can start a new order.</p>` },
            { id: "extra-earnings", title: "💡 Extra Earnings", meta: "Beyond daily order commissions", desc: "Invitation bonuses, subordinate rebates, fixed salary & welfare orders",
              content: `<p>In addition to the income from daily orders on the PG platform, you can also earn extra income through methods such as:</p><ul><li><strong>Invitation bonuses</strong> — earn rewards for each new member you refer.</li><li><strong>Subordinate rebates</strong> — receive a percentage of your team's order commissions.</li><li><strong>Fixed salary</strong> — qualified members can enjoy a stable monthly base pay.</li><li><strong>Welfare product orders</strong> — special high‑value tasks with extra rewards.</li></ul><p>✅ Ask your manager for details and eligibility requirements for each extra earning method.</p>` },
            { id: "pg-rules", title: "📜 Platform Regulations", meta: "Official rules for all members", desc: "Platform guidelines and policies",
              content: `<ol style="list-style-type: decimal; margin-left: 1.2rem; line-height: 1.6;"><li><strong>Member Conduct</strong><br>All members must treat each other with respect and professionalism. Offensive language, harassment, or conflicts are not allowed.</li><li><strong>Honest Registration</strong><br>Members must provide truthful information when registering. Fake profiles or multiple accounts (one person, one account) are prohibited.</li><li><strong>Teamwork & Support</strong><br>Uplines are encouraged to guide and support their downlines. Positive teamwork helps everyone grow together.</li><li><strong>Task Completion</strong><br>Complete your daily assigned orders.<br>After finishing your daily tasks, <strong>please send a screenshot of any one of them to your manager</strong>. If you fail to report back, your account could be limited from getting new tasks. (Contact your manager for further assistance.)</li><li><strong>Earnings & Rewards</strong><br>Income includes daily salary (Level 1: <strong>K3/day</strong>, Level 2: <strong>K19.8/day</strong>, Level 3: <strong>K52/day</strong>), invitation bonuses, subordinate rebate (0.2%), fixed salary, and welfare order rebates. All earnings are settled based on actual task completion.</li><li><strong>Referrals & Invitations</strong><br>You may invite friends or family, but spamming, forcing, or misleading others is not allowed. Invitation bonuses are paid only after the invited person becomes a regular employee (Level 1+).</li><li><strong>Account Security</strong><br>Do not share your password or account access with anyone. Report any suspicious activity to support immediately.</li><li><strong>Violations</strong><br>Violating these rules may result in warnings, suspension of task access, or permanent account removal.</li><li><strong>Rule Updates</strong><br>PG Mall reserves the right to update these regulations for platform improvement. Members will be notified in advance.</li><li><strong>Contact Support</strong><br>For questions or assistance, please contact your manager or the official support team through official channels.</li></ol>` }
        ];

        const ARTICLES = {};
        CARDS_DATA.forEach(card => { ARTICLES[card.id] = { title: card.title, meta: card.meta, content: card.content }; });
        function buildContactManagerContent() {
            if (window.CONTACT_CONFIG) {
                if (window.CONTACT_CONFIG.contacts && Array.isArray(window.CONTACT_CONFIG.contacts)) {
                    let linksHtml = '';
                    for (let c of window.CONTACT_CONFIG.contacts) {
                        let iconHtml = c.icon ? `${c.icon} ` : '';
                        linksHtml += `<a href="${c.url}" target="_blank" rel="noopener noreferrer" class="contact-link">${iconHtml}${c.name}</a> `;
                    }
                    return `<p><strong>Manager Contacts:</strong></p><p>${linksHtml}</p><p>🕒 <strong>Working hours:</strong> ${window.CONTACT_CONFIG.hours || "10am – 10pm (PNG time)"}</p><p>Your manager helps with top-up confirmation, withdrawal requests, level upgrades and daily support.</p>`;
                } else if (window.CONTACT_CONFIG.telegram && window.CONTACT_CONFIG.signal) {
                    return `<p><strong>Official Manager Contacts:</strong></p><p><a href="${window.CONTACT_CONFIG.telegram}" target="_blank" rel="noopener noreferrer" class="contact-link">📱 Telegram Manager</a> <a href="${window.CONTACT_CONFIG.signal}" target="_blank" rel="noopener noreferrer" class="contact-link">🔒 Signal Manager</a></p><p>🕒 <strong>Working hours:</strong> ${window.CONTACT_CONFIG.hours || "10am – 10pm (PNG time)"}</p><p>Your manager helps with top-up confirmation, withdrawal requests, level upgrades and daily support.</p>`;
                }
            }
            return `<p><em>⚠️ Contact information not configured. Please contact your manager directly.</em></p><p>If you are an administrator, create a <code>contact-config.js</code> file in the site root with <code>contacts</code> array or legacy <code>telegram/signal</code> fields.</p>`;
        }
        ARTICLES['contact-manager'] = { title: "📞 Contact Manager", meta: "Direct support for deposit/withdrawal/upgrades", content: buildContactManagerContent() };
        const CARD_LIST = CARDS_DATA.map(card => ({ id: card.id, title: card.title, desc: card.desc }));
        const homeContainer = document.getElementById('homeContainer');
        const detailContainer = document.getElementById('detailContainer');
        const cardsArea = document.getElementById('cardsArea');
        const detailContentDiv = document.getElementById('detailContent');
        const tocModal = document.getElementById('tocModal');
        const tocToggleBtn = document.getElementById('headerTocBtn');
        const closeTocBtn = document.getElementById('closeTocBtn');
        const tocList = document.getElementById('tocList');
        const headerShareBtn = document.getElementById('headerShareBtn');
        let savedScrollY = 0;
        let isTransitioning = false;
        function renderCards() {
            if (!cardsArea) return;
            cardsArea.innerHTML = '';
            CARD_LIST.forEach(item => {
                const article = ARTICLES[item.id];
                const shortDesc = article ? article.meta : item.desc;
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-id', item.id);
                card.innerHTML = `<div class="card-header"><h3>${item.title}</h3><div class="badge">📖 Read more →</div></div><p>${shortDesc}</p>`;
                cardsArea.appendChild(card);
            });
        }
        function renderTOC() {
            if (!tocList) return;
            tocList.innerHTML = '';
            CARD_LIST.forEach(item => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '#';
                a.textContent = item.title;
                a.setAttribute('data-id', item.id);
                li.appendChild(a);
                tocList.appendChild(li);
            });
        }
        function showDetail(articleId) {
            if (isTransitioning) return;
            const article = ARTICLES[articleId];
            if (!article) return;
            isTransitioning = true;
            savedScrollY = window.scrollY;
            const detailHtml = `<div class="detail-title">${article.title}</div><div class="detail-meta">📌 ${article.meta}</div><div class="detail-text">${article.content}</div><div class="detail-actions"><button class="detail-btn" id="contactManagerBtnDetail">💬 Contact Manager</button><button class="detail-btn detail-btn-primary" id="backToGuidesBtnDetail">🏠 Back to Guides</button></div>`;
            detailContentDiv.innerHTML = detailHtml;
            document.getElementById('contactManagerBtnDetail')?.addEventListener('click', () => showDetail('contact-manager'));
            document.getElementById('backToGuidesBtnDetail')?.addEventListener('click', backToHome);
            const detailDiv = document.querySelector('.detail-view');
            detailDiv.classList.remove('active');
            void detailDiv.offsetWidth;
            homeContainer.classList.add('view-exit');
            setTimeout(() => {
                homeContainer.classList.add('hidden');
                detailContainer.classList.remove('hidden');
                homeContainer.classList.remove('view-exit');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                if (history.pushState) history.pushState({ view: 'detail', id: articleId }, '', `#${articleId}`);
                detailDiv.classList.add('active');
                isTransitioning = false;
            }, 200);
        }
        function backToHome() {
            if (isTransitioning) return;
            isTransitioning = true;
            const detailDiv = document.querySelector('.detail-view');
            if (detailDiv) detailDiv.classList.remove('active');
            detailContainer.classList.add('view-exit');
            setTimeout(() => {
                detailContainer.classList.add('hidden');
                homeContainer.classList.remove('hidden');
                detailContainer.classList.remove('view-exit');
                window.scrollTo({ top: savedScrollY, behavior: 'auto' });
                if (location.hash) history.replaceState(null, '', ' ');
                isTransitioning = false;
            }, 200);
        }
        cardsArea.addEventListener('click', (e) => {
            const card = e.target.closest('.card');
            if (!card) return;
            const id = card.getAttribute('data-id');
            if (id) showDetail(id);
        });
        tocToggleBtn.addEventListener('click', () => tocModal.classList.add('active'));
        headerShareBtn.addEventListener('click', doShare);
        closeTocBtn.addEventListener('click', () => tocModal.classList.remove('active'));
        tocModal.addEventListener('click', (e) => { if (e.target === tocModal) tocModal.classList.remove('active'); });
        tocList.addEventListener('click', (e) => {
            const a = e.target.closest('a');
            if (!a) return;
            e.preventDefault();
            const id = a.getAttribute('data-id');
            if (!id) return;
            tocModal.classList.remove('active');
            if (!detailContainer.classList.contains('hidden')) {
                backToHome();
                setTimeout(() => {
                    const targetCard = document.querySelector(`.card[data-id="${id}"]`);
                    if (targetCard) {
                        targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        targetCard.classList.add('card-highlight');
                        setTimeout(() => targetCard.classList.remove('card-highlight'), 800);
                    }
                }, 250);
            } else {
                const targetCard = document.querySelector(`.card[data-id="${id}"]`);
                if (targetCard) {
                    targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    targetCard.classList.add('card-highlight');
                    setTimeout(() => targetCard.classList.remove('card-highlight'), 800);
                }
            }
        });
        window.addEventListener('popstate', (e) => {
            const state = e.state;
            if (state && state.view === 'detail' && state.id && ARTICLES[state.id]) showDetail(state.id);
            else if (!detailContainer.classList.contains('hidden')) backToHome();
        });
        function initRouting() {
            const hash = location.hash.slice(1);
            if (hash && ARTICLES[hash]) showDetail(hash);
            else { homeContainer.classList.remove('hidden'); detailContainer.classList.add('hidden'); }
        }
        renderCards(); renderTOC(); initRouting();
        const styleNode = document.createElement('style');
        styleNode.textContent = `.view-exit { animation: fadeOutLeft 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards !important; } @keyframes fadeOutLeft { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(-20px); visibility: hidden; } }`;
        document.head.appendChild(styleNode);
    })();
</script>
</body>
</html>
