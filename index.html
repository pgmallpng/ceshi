        function onTouchMove(e) { if (isPinching && e.touches.length === 2) { e.preventDefault(); const newDistance = getDistance(e.touches); let scale = initialScale * (newDistance / initialDistance); scale = Math.min(Math.max(scale, 0.5), 3); if (scale !== currentZoom) { currentZoom = scale; applyTransform(); clampTranslate(); } } else if (isDragging && e.touches.length === 1) onDrag(e); }
        function onTouchEnd(e) { if (isPinching) { isPinching = false; clampTranslate(); } if (isDragging) endDrag(); }
        function onWheel(e) { if (!lightboxActive) return; e.preventDefault(); const delta = e.deltaY > 0 ? -0.1 : 0.1; let newZoom = currentZoom + delta; newZoom = Math.min(Math.max(newZoom, 0.5), 3); if (newZoom !== currentZoom) { currentZoom = newZoom; applyTransform(); clampTranslate(); } }
        lightbox.addEventListener('mousedown', startDrag); window.addEventListener('mousemove', onDrag); window.addEventListener('mouseup', endDrag); lightbox.addEventListener('touchstart', onTouchStart, { passive: false }); lightbox.addEventListener('touchmove', onTouchMove, { passive: false }); lightbox.addEventListener('touchend', onTouchEnd); lightbox.addEventListener('wheel', onWheel, { passive: false }); lightbox.addEventListener('click', (e) => { if (e.target === lightbox || e.target === lightboxContent) closeLightbox(); }); closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeLightbox(); }); zoomInBtn.addEventListener('click', (e) => { e.stopPropagation(); zoomIn(); }); zoomOutBtn.addEventListener('click', (e) => { e.stopPropagation(); zoomOut(); }); zoomResetBtn.addEventListener('click', (e) => { e.stopPropagation(); resetZoomAndPan(); clampTranslate(); });

        // card data
        const CARDS_DATA = [
            { id: "what-is-pg", title: "🌐 What Is PG?", meta: "Legal tech service since 2018 · 8 years stable", desc: "Online work platform since 2018",
              content: `<p>PG (PG Playground) is a legally registered technology service company in Colorado, USA. PG has been stably operating for <strong>8 years</strong> since its founding in 2018.</p><p>We specialize in providing online marketing data support for global brands by generating real order records to enhance their market visibility.</p><p>Users earn commissions by completing assigned order tasks. Tasks are divided by levels — higher levels come with more daily tasks and higher daily pay. All tasks are generated based on real brand demands, ensuring data authenticity and business compliance.</p><p>Income is settled based on actual task completion. Withdrawals are supported every workday (minimum amount varies by level, no upper limit).</p><p>All deposits serve as order working capital and are fully refundable upon exit.</p><p>The platform uses an automated order review and settlement system to ensure transaction transparency and fund security.</p><p>PG is committed to transparent rules, refundable funds, and real earnings. We do not promise "get rich quick" — but we strive to provide every diligent user with a long‑term, stable, and sustainable online work opportunity.</p><p>For any questions, please contact your manager or the official support team.</p>` },
            { id: "why-pg-safe", title: "🔒 Why Is PG Safe?", meta: "Legal registration, fund security, transparent rules", desc: "Legal, stable, fund security & verifiable",
              content: `<ul><li><strong>Legally Registered</strong> — Colorado, USA (2018), address publicly accessible</li><li><strong>Stable Operation</strong> — Stably operated for 8 years</li><li><strong>Fund Security</strong> — Deposit is working capital, earnings are labor‑based</li><li><strong>Transparent Rules</strong> — Every record traceable, income matched to orders</li><li><strong>Verifiable</strong> — Company info can be verified via official channels</li></ul><p>⭐ Thousands trust PG for daily online income – fully compliant.</p><div style="display: flex; flex-direction: column; align-items: center; margin-top: 20px;"><img src="images/pg-registration.jpg" alt="PG Registration Certificate" style="max-width: 100%; border-radius: 12px; cursor: pointer;" onclick="openLightbox(this)"><div style="margin-top: 8px; font-size: 0.8rem; color: var(--text-muted);">PG Registration Certificate</div><div style="margin-top: 12px;"><a href="https://www.coloradosos.gov/biz/BusinessEntityDetail.do?quitButtonDestination=BusinessEntityCriteriaExt&fileId=20181650293&masterFileId=" target="_blank" rel="noopener noreferrer" style="display: inline-block; background: var(--contact-bg); padding: 6px 14px; border-radius: 40px; text-decoration: none; color: var(--badge-color); font-weight: 500; font-size: 0.85rem;">🔍 Verify on Colorado SOS ↗</a></div></div>` },
            { id: "deposit-earnings", title: "💰 Earn per Level", meta: "Level 1–3 · daily tasks · weekly income & withdrawal limits", desc: "Weekly earnings: K21 (L1) · K138.6 (L2) · K364 (L3)",
              content: `<div class="salary-grid"><div class="salary-card-item"><div class="level-header"><span class="level-name">🌟 Level 1</span><span class="level-badge">💰 Recharge: K240</span></div><div class="salary-details"><div class="detail-field"><div class="field-label">📋 Tasks per day</div><div class="field-value">3</div></div><div class="detail-field"><div class="field-label">🏆 Weekly income</div><div class="field-value">K21</div></div><div class="detail-field"><div class="field-label">💸 Min withdrawal</div><div class="field-value">K14</div></div><div class="detail-field"><div class="field-label">💸 Max withdrawal</div><div class="field-value">No limit</div></div></div></div><div class="salary-card-item"><div class="level-header"><span class="level-name">⭐ Level 2</span><span class="level-badge">💰 Recharge: K670</span></div><div class="salary-details"><div class="detail-field"><div class="field-label">📋 Tasks per day</div><div class="field-value">6</div></div><div class="detail-field"><div class="field-label">🏆 Weekly income</div><div class="field-value">K138.6</div></div><div class="detail-field"><div class="field-label">💸 Min withdrawal</div><div class="field-value">K80</div></div><div class="detail-field"><div class="field-label">💸 Max withdrawal</div><div class="field-value">No limit</div></div></div></div><div class="salary-card-item"><div class="level-header"><span class="level-name">🚀 Level 3</span><span class="level-badge">💰 Recharge: K1,700</span></div><div class="salary-details"><div class="detail-field"><div class="field-label">📋 Tasks per day</div><div class="field-value">8</div></div><div class="detail-field"><div class="field-label">🏆 Weekly income</div><div class="field-value">K364</div></div><div class="detail-field"><div class="field-label">💸 Min withdrawal</div><div class="field-value">K250</div></div><div class="detail-field"><div class="field-label">💸 Max withdrawal</div><div class="field-value">No limit</div></div></div></div></div><p><em>Interns are eligible for a discount. Contact your manager for the exact amount.</em></p>
<p>✅ When you upgrade to a higher level, your previous level deposit will be fully refunded. For example, upgrading from Level 1 (K240) to Level 2 (K670) will refund the K240 deposit.</p>
<p>💡 Your deposit is working capital (fully refundable). Higher level = more daily orders + higher earnings.</p>` },
            { id: "topup-steps", title: "🔁 Top‑Up Steps", meta: "4 easy steps to fund your account", desc: "Contact manager → transfer → confirm → credit",
              content: `<ol><li>Contact your manager to get the current account details.</li><li>Transfer the required deposit (keep a screenshot of the Ref No).</li><li>Send the screenshot to your manager. Once confirmed, the funds will be credited to your PG account.</li><li>The platform supports transfers via <strong>BSP, Kina, USDT, and other local banks</strong>.</li></ol><div class="warning-box">⚠️ Always confirm details with your manager before any transfer.</div>` },
            { id: "withdrawal-rules", title: "🏦 Withdrawal", meta: "Request schedule & arrival time", desc: "Mon–Fri only, arrive 1–4 days",
              content: `<ul><li><strong>Withdrawal request:</strong> Monday–Friday (no requests on weekends).</li><li><strong>Funds arrive:</strong> 1–4 days (including weekends).</li><li><strong>Minimum withdrawal:</strong> depends on your level.</li></ul><div class="warning-box">📌 All withdrawals are processed in order. Make sure your bank account details are correct to avoid delays.</div>` },
            { id: "why-topup", title: "❓ Why Top Up?", meta: "Deposit = working capital (refundable)", desc: "Deposit is working capital, fully refundable",
              content: `<p>The deposit is <strong>not a "fee"</strong> – it's working capital to support your order flow.</p><p>Each order requires matching funds to complete the process. Your deposit stays in your account as a tool for your daily tasks. Every order you complete earns you commission. When you upgrade or leave, the deposit is fully refunded.</p><div class="warning-box">✅ Your earnings are purely from completed tasks.</div>` },
            { id: "task-steps", title: "📝 Task Steps", meta: "Step-by-step guide for interns & level 1-3", desc: "Step-by-step: add address → submit order",
              content: `<p><strong>📍 1. Add your shipping address (one time only)</strong><br>Go to <strong>User Center</strong> (bottom right) → scroll down to find "Shipping Address" → enter your address once.</p><p><strong>🏠 2. Enter the task page</strong><br>On Home screen, tap <strong>"intern"</strong> (if you are an intern) or your level button (<strong>Level 1/2/3</strong>). Then select the first item and click <strong>"Buy Now"</strong>.</p><p><strong>🛒 3. Review order & submit</strong><br>After selecting <strong>"Select All"</strong>, click <strong>"Checkout"</strong> → then click <strong>"Submit Order and Confirm"</strong>.</p><div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center; margin:20px 0;"><div style="text-align:center; width:160px;"><img src="images/address.jpg" alt="Shipping address" style="width:100%; border-radius:12px; cursor:pointer;" onclick="openLightbox(this)" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27100%27%20height%3D%27100%27%3E%3Crect%20fill%3D%27%23ccc%27%20width%3D%27100%27%20height%3D%27100%27%2F%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2750%25%27%20dominant-baseline%3D%27middle%27%20text-anchor%3D%27middle%27%20fill%3D%27%23666%27%3ENo%20image%3C%2Ftext%3E%3C%2Fsvg%3E'"><div style="font-size:0.7rem; color:#5c7e97;">📍 Shipping address</div></div><div style="width:100%;"><div class="scrollable-img"><img src="images/checkout.png" alt="Full order process" style="max-height:300px; border-radius:12px; cursor:pointer;" onclick="openLightbox(this)" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%27200%27%20height%3D%27100%27%3E%3Crect%20fill%3D%27%23ccc%27%20width%3D%27200%27%20height%3D%27100%27%2F%3E%3Ctext%20x%3D%2750%25%27%20y%3D%2750%25%27%20dominant-baseline%3D%27middle%27%20text-anchor%3D%27middle%27%20fill%3D%27%23666%27%3ENo%20image%3C%2Ftext%3E%3C%2Fsvg%3E'"></div><div style="font-size:0.7rem; color:#5c7e97; text-align:center;">📋 Swipe right to see full task flow →</div></div></div><p>✅ Once submitted, the system starts a countdown. When the countdown ends, the commission will be automatically credited to your balance.</p><p><em>This order is intended to help brands improve their product sales data. No physical product will be shipped to you.</em></p>` },
            { id: "order-guide", title: "📋 Order Guide", meta: "Order fields, status colors & batch completion", desc: "Entry, fields, red/green colors, batch logic",
              content: `<p><strong>Two ways to access your orders:</strong><br>\n- After submitting a task, you are redirected to "My Orders".<br>\n- From the home screen, tap <strong>"User Center"</strong> → <strong>"My Orders"</strong>.</p>\n<p><strong>Order card fields:</strong><br>\nEach order card shows: Order number, date, product(s), total amount, <strong>commission earned</strong>, payment status, shipping status, and countdown timer (<strong>Time Left</strong> / <strong>Shipped</strong>).</p>\n<p><strong>🎨 Order Status Colors</strong><br>\n<span style="color:#f87171;">🔴 Red order title</span> – Appears only in the <strong>"Pending processing"</strong> list. This individual order has finished its countdown, but other orders in the same batch are still running.<br>\n<span style="color:#4ade80;">🟢 Green order title</span> – Order countdown is still in progress.<br>\nAfter <strong>all</strong> orders in a batch are completed, the entire batch moves to the <strong>"Completed"</strong> list (no red labels there).</p>\n<p><strong>📦 Batch orders</strong><br>\nWhen you submit 2 or more orders together, they appear as one batch. Different countdowns may cause some to finish earlier (turn red) while others remain green.</p>\n<p><strong>📌 Maximum concurrent orders</strong><br>\n- Level 1: <strong>3</strong> orders &nbsp;|&nbsp; Level 2: <strong>6</strong> orders &nbsp;|&nbsp; Level 3: <strong>8</strong> orders<br>\n(You can run this many orders at the same time. When one finishes, you can add a new one.)</p>\n<div class="warning-box">💡 Wait patiently during countdown. Once credited, check your balance in "User Center", then start a new order.</div>\n<div style="margin: 20px 0; text-align: center;">\n  <img src="images/order-status-sample.jpg" alt="Order status sample: red and green titles" style="max-width: 100%; border-radius: 12px; cursor: pointer;" onclick="openLightbox(this)" onerror="this.style.display='none'">\n  <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 6px;">Example: red (finished) and green (pending) orders in batch</div>\n</div>` },
            { id: "commission-rules", title: "📊 Commission Rules", meta: "Daily base × countdown days + quick reference", desc: "Calculate commission: daily base * days",
              content: `<p><strong>Single order commission formula:</strong><br>\nCommission = <strong>Daily base × Countdown days</strong><br>\n(Countdown is always whole days, minimum 1 day)</p>\n<p><strong>Daily base per level:</strong><br>\nLevel 1: <strong>K1</strong> &nbsp;|&nbsp; Level 2: <strong>K3.3</strong> &nbsp;|&nbsp; Level 3: <strong>K6.5</strong></p>\n<p><strong>Example:</strong> Level 1 order with 15-day countdown → K1 × 15 = <strong>K15 commission</strong>.</p>\n<div style="overflow-x: auto; margin: 16px 0;">\n  <table style="min-width: 280px;">\n    <thead>\n      <tr><th>Level</th><th>Daily base</th><th>Max orders</th><th>Daily total</th><th>Weekly total</th></tr>\n    </thead>\n    <tbody>\n      <tr><td><strong>Level 1</strong></td><td>K1</td><td>3</td><td><strong>K3</strong></td><td>K21</td></tr>\n      <tr><td><strong>Level 2</strong></td><td>K3.3</td><td>6</td><td><strong>K19.8</strong></td><td>K138.6</td></tr>\n      <tr><td><strong>Level 3</strong></td><td>K6.5</td><td>8</td><td><strong>K52</strong></td><td>K364</td></tr>\n    </tbody>\n  </table>\n</div>\n<p><em>Longer countdowns increase your commission proportionally.</em></p>` },
            { id: "extra-earnings", title: "💡 Extra Earnings", meta: "Beyond daily order commissions", desc: "Invitation bonuses, subordinate rebates, fixed salary & welfare orders",
              content: `<p>In addition to the income from daily orders on the PG platform, you can also earn extra income through methods such as:</p><ul><li><strong>Invitation bonuses</strong> — earn rewards for each new member you refer.</li><li><strong>Subordinate rebates</strong> — receive a percentage of your team's order commissions.</li><li><strong>Fixed salary</strong> — qualified members can enjoy a stable monthly base pay.</li><li><strong>Welfare product orders</strong> — special high‑value tasks with extra rewards.</li></ul><div class="warning-box">✅ Ask your manager for details and eligibility requirements for each extra earning method.</div>` },
            { id: "platform-synergy", title: "🔄 Synergy & Growth", meta: "Invite → Bonus → Welfare orders → Upgrade → Team salary → Downline rebates", desc: "How invitations, bonuses, upgrades, team salary and rebates work together",
              content: `<p>PG's activity system is highly interconnected — every action fuels the next opportunity:</p>
<ol style="margin-left: 1.2rem; line-height: 1.6;">
  <li><strong>Invite new members</strong> → Earn <strong>invitation bonus</strong> once they become regular staff (Level 1+).</li>
  <li><strong>Use your bonus</strong> → Participate in <strong>Welfare Product Orders</strong> which yield higher commissions.</li>
  <li><strong>Accumulate earnings</strong> → Upgrade to Level 2 or Level 3, unlocking more daily tasks and higher income.</li>
  <li><strong>Build your team</strong> → When your downline members upgrade (e.g., to Level 2+), you receive <strong>fixed team salary</strong> and <strong>downline rebates (0.2% of the product value of their orders)</strong>.</li>
  <li><strong>Scale up</strong> → More active team members = more passive income, creating a sustainable growth loop.</li>
</ol>
<div class="warning-box">💡 Every level deposit is fully refundable when you upgrade.</div>` },            
            { id: "order-block-reasons", title: "🚫 Order Block Reasons", meta: "3 common errors & how to fix them", desc: "Why you can't place an order and what to do",
              content: `<p>As a staff member, you may occasionally see one of these three error messages when trying to place an order. Here's what they mean and how to resolve them:</p>
<ol style="margin-left: 1.2rem; line-height: 1.8;">
  <li><strong>"This product can only be purchased 1 item per day..."</strong><br>
  You have already added this product to your cart but haven't submitted the order. Go to your <strong>shopping cart</strong> and complete the checkout. You cannot add the same product again until the existing order is submitted or removed.</li>
  <li><strong>"Insufficient Deposit"</strong><br>
  You are trying to submit more orders than your level's concurrent processing limit (Level 1: 3, Level 2: 6, Level 3: 8). Check <strong>"My Orders"</strong> for pending orders. Delete some items from your cart so that total pending + new orders ≤ your limit.</li>
  <li><strong>"Your account status does not allow placing orders"</strong><br>
  Your account has been flagged as inactive because you haven't contacted your manager for a long time. Reach out to your manager to request reinstatement of order privileges.</li>
</ol>
<div class="warning-box">💡 Always monitor "My Orders" and clear pending items before adding new tasks. Contact your manager if you're unsure about any error.</div>` },
            { id: "letter-to-team", title: "💌 A Letter to Our Team", meta: "An honest, sustainable opportunity", desc: "We are here to place an honest, sustainable opportunity into your hands.",
              content: `<p>Dear friend,</p>
<p>We are not here to take from anyone. We are here to place a real, honest, and sustainable opportunity into the hands of those who seek a better life — for themselves and for their families.</p>
<p>PG is built on <strong>work, not tricks</strong>. Every member earns through their own effort. When you invite someone, you are not building a "downline" — you are <strong>extending a hand</strong>. The platform simply thanks you for showing another person the way.</p>
<p>This is a cycle of good: you help someone stand firm, and later, they help someone else. Together, we reduce poverty, restore trust, and protect families from unstable schemes that promise much but deliver nothing.</p>
<p>The person you invite today is not a number. They are a father, a mother, a child’s hope.</p>
<p>Let us lift each other up. Let us build a community where hard work is rewarded, honesty is respected, and no one is left behind.</p>
<p style="margin-top: 20px;">God bless you, and everyone you bring in. ❤️</p>` },
            { id: "pg-rules", title: "📜 Platform Regulations", meta: "Official rules for all members", desc: "Platform guidelines and policies",
              content: `<ol style="list-style-type: decimal; margin-left: 1.2rem; line-height: 1.6;"><li><strong>Member Conduct</strong><br>All members must treat each other with respect and professionalism. Offensive language, harassment, or conflicts are not allowed.</li><li><strong>Honest Registration</strong><br>Members must provide truthful information when registering. Fake profiles or multiple accounts (one person, one account) are prohibited.</li><li><strong>Teamwork & Support</strong><br>Uplines are encouraged to guide and support their downlines. Positive teamwork helps everyone grow together.</li><li><strong>Task Completion</strong><br>Complete your daily assigned orders.<br>After finishing your daily tasks, <strong>please send a screenshot of any one of them to your manager</strong>. If you fail to report back, your account could be limited from getting new tasks. (Contact your manager for further assistance.)</li><li><strong>Earnings & Rewards</strong><br>Income includes daily salary (Level 1: <strong>K3/day</strong>, Level 2: <strong>K19.8/day</strong>, Level 3: <strong>K52/day</strong>), invitation bonuses, subordinate rebate (0.2%), fixed salary, and welfare order rebates. All earnings are settled based on actual task completion.</li><li><strong>Referrals & Invitations</strong><br>You may invite friends or family, but spamming, forcing, or misleading others is not allowed. Invitation bonuses are paid only after the invited person becomes a regular employee (Level 1+).</li><li><strong>Account Security</strong><br>Do not share your password or account access with anyone. Report any suspicious activity to support immediately.</li><li><strong>Violations</strong><br>Violating these rules may result in warnings, suspension of task access, or permanent account removal.</li><li><strong>Rule Updates</strong><br>PG Mall reserves the right to update these regulations for platform improvement. Members will be notified in advance.</li><li><strong>Contact Support</strong><br>For questions or assistance, please contact your manager or the official support team through official channels.</li></ol>` }
        ];

        const detailContainer = document.getElementById('detailContainer');
        const cardsArea = document.getElementById('cardsArea');
        const detailContentDiv = document.getElementById('detailContent');
        const tocModal = document.getElementById('tocModal');
        const tocToggleBtn = document.getElementById('headerTocBtn');
        const closeTocBtn = document.getElementById('closeTocBtn');
        const tocList = document.getElementById('tocList');
        const headerShareBtn = document.getElementById('headerShareBtn');
        const floatingBtn = document.getElementById('floatingContactBtn');
        let savedScrollY = 0;
        let isTransitioning = false;
        
        function getVisibleIds() {
            if (currentFilter === "intern") return INTERN_IDS;
            if (currentFilter === "staff") return STAFF_IDS;
            return ALL_CARDS.map(c => c.id);
        }
        
        function renderCards() {
            if (!cardsArea) return;
            const visible = getVisibleIds();
            cardsArea.innerHTML = '';
            ALL_CARDS.forEach(card => {
                if (!visible.includes(card.id)) return;
                const article = ARTICLES[card.id];
                const shortDesc = article ? article.meta : card.desc;
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.setAttribute('data-id', card.id);
                cardDiv.innerHTML = `<div class="card-header"><h3>${card.title}</h3><div class="badge">📖 Read more →</div></div><p>${shortDesc}</p>`;
                cardsArea.appendChild(cardDiv);
            });
        }
        
        function renderTOC() {
            if (!tocList) return;
            const visibleIds = getVisibleIds();
            tocList.innerHTML = '';
            ALL_CARDS.forEach(card => {
                if (!visibleIds.includes(card.id)) return;
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '#';
                a.textContent = card.title;
                a.setAttribute('data-id', card.id);
                li.appendChild(a);
                tocList.appendChild(li);
            });
        }
        
        function goHomeAndFilter(newFilter) {
            if (isTransitioning) return;
            if (!detailContainer.classList.contains('hidden')) {
                backToHome(true);
            }
            currentFilter = newFilter;
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => {
                if (btn.getAttribute('data-filter') === newFilter) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderCards();
            renderTOC();
        }
        
        function showDetail(articleId, fromBack = false) {
            if (isTransitioning) return;
   if (currentFilter !== 'all') {
        const visibleIds = getVisibleIds();
        if (!visibleIds.includes(articleId)) {
            currentFilter = 'all';
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => {
                if (btn.getAttribute('data-filter') === 'all') btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderCards();
            renderTOC();
        }
    }
            const article = ARTICLES[articleId];
            if (!article) return;
            isTransitioning = true;
            savedScrollY = window.scrollY;
            let actionsHtml = '';
            if (articleId === 'contact-manager') {
                actionsHtml = `<div class="detail-actions"><button class="detail-btn detail-btn-primary" id="backToGuidesBtnDetail">🏠 Back to Guides</button></div>`;
            } else {
                actionsHtml = `<div class="detail-actions"><button class="detail-btn" id="contactManagerBtnDetail">💬 Contact Manager</button><button class="detail-btn detail-btn-primary" id="backToGuidesBtnDetail">🏠 Back to Guides</button></div>`;
            }
            const detailHtml = `<div class="detail-title">${article.title}</div><div class="detail-meta">📌 ${article.meta}</div><div class="detail-text">${article.content}</div>${actionsHtml}`;
            detailContentDiv.innerHTML = detailHtml;
            if (articleId !== 'contact-manager') {
                document.getElementById('contactManagerBtnDetail')?.addEventListener('click', () => showDetail('contact-manager'));
            }
            document.getElementById('backToGuidesBtnDetail')?.addEventListener('click', backToHome);
            const detailDiv = document.querySelector('.detail-view');
            detailDiv.classList.remove('active');
            void detailDiv.offsetWidth;
            homeContainer.classList.add('view-exit');
            setTimeout(() => {
                homeContainer.classList.add('hidden');
                detailContainer.classList.remove('hidden');
                homeContainer.classList.remove('view-exit');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                if (!fromBack && history.pushState) history.pushState({ view: 'detail', id: articleId }, '', `#${articleId}`);
                detailDiv.classList.add('active');
                isTransitioning = false;
            }, 200);
        }
        
        function backToHome(skipPushState = false) {
            if (isTransitioning) return;
            isTransitioning = true;
            const detailDiv = document.querySelector('.detail-view');
            if (detailDiv) detailDiv.classList.remove('active');
            detailContainer.classList.add('view-exit');
            setTimeout(() => {
                detailContainer.classList.add('hidden');
                homeContainer.classList.remove('hidden');
                detailContainer.classList.remove('view-exit');
                window.scrollTo({ top: savedScrollY, behavior: 'auto' });
                if (location.hash) {
                    const cleanUrl = window.location.pathname + window.location.search;
                    history.replaceState(null, '', cleanUrl);
                }
                isTransitioning = false;
            }, 200);
        }
        
        floatingBtn.addEventListener('click', () => {
            if (!detailContainer.classList.contains('hidden')) {
                backToHome();
                setTimeout(() => showDetail('contact-manager'), 250);
            } else {
                showDetail('contact-manager');
            }
        });
        
        cardsArea.addEventListener('click', (e) => {
            const card = e.target.closest('.card');
            if (!card) return;
            const id = card.getAttribute('data-id');
            if (id) showDetail(id);
        });
        
        tocToggleBtn.addEventListener('click', () => tocModal.classList.add('active'));
        headerShareBtn.addEventListener('click', doShare);
        closeTocBtn.addEventListener('click', () => tocModal.classList.remove('active'));
        tocModal.addEventListener('click', (e) => { if (e.target === tocModal) tocModal.classList.remove('active'); });
        tocList.addEventListener('click', (e) => {
            const a = e.target.closest('a');
            if (!a) return;
            e.preventDefault();
            const id = a.getAttribute('data-id');
            if (!id) return;
            tocModal.classList.remove('active');
            if (!detailContainer.classList.contains('hidden')) {
                backToHome();
                setTimeout(() => showDetail(id), 250);
            } else {
                const targetCard = document.querySelector(`.card[data-id="${id}"]`);
                if (targetCard) {
                    targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    targetCard.classList.add('card-highlight');
                    setTimeout(() => targetCard.classList.remove('card-highlight'), 800);
                } else {
                    showDetail(id);
                }
            }
        });
        
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.getAttribute('data-filter');
                if (filter === currentFilter) return;
                goHomeAndFilter(filter);
            });
        });
        
        window.addEventListener('popstate', (e) => {
            const state = e.state;
            if (state && state.view === 'detail' && state.id && ARTICLES[state.id]) {
                showDetail(state.id, true);
            } else if (!detailContainer.classList.contains('hidden')) {
                backToHome(true);
            }
        });
        
        function initRouting() {
            const hash = location.hash.slice(1);
            if (hash && ARTICLES[hash]) showDetail(hash);
            else { homeContainer.classList.remove('hidden'); detailContainer.classList.add('hidden'); }
        }
        
        renderCards(); renderTOC(); initRouting();
    })();
</script>
</body>
</html>
